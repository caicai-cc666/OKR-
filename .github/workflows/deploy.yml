name: Deploy production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      ssh_deploy:
        description: "Run the legacy SSH deploy job"
        required: false
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.ssh_deploy == true && vars.ENABLE_SSH_DEPLOY == 'true' }}
    steps:
      - name: Check deployment secrets
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST || vars.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER || vars.ALIYUN_USER }}
          ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || vars.ALIYUN_PORT }}
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$ALIYUN_HOST" ]; then
            echo "::error::Missing repository secret: ALIYUN_HOST"
            missing=1
          fi
          if [ -z "$ALIYUN_USER" ]; then
            echo "::error::Missing repository secret: ALIYUN_USER"
            missing=1
          fi
          if [ -z "$ALIYUN_SSH_KEY" ]; then
            echo "::error::Missing repository secret: ALIYUN_SSH_KEY"
            missing=1
          fi
          if [ -n "$ALIYUN_PORT" ] && ! echo "$ALIYUN_PORT" | grep -Eq '^[0-9]+$'; then
            echo "::error::ALIYUN_PORT must be a number, for example 22"
            missing=1
          fi
          if ! echo "$ALIYUN_SSH_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            echo "::error::ALIYUN_SSH_KEY must contain the full private key, including BEGIN/END OPENSSH PRIVATE KEY lines"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Deployment secrets are present."

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          OKR_REPO_ZIP_URL: https://codeload.github.com/${{ github.repository }}/zip/${{ github.sha }}
          OKR_DEPLOY_REF: ${{ github.sha }}
        with:
          host: ${{ secrets.ALIYUN_HOST || vars.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER || vars.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT || vars.ALIYUN_PORT || '22' }}
          timeout: 60s
          command_timeout: 30m
          envs: OKR_REPO_ZIP_URL,OKR_DEPLOY_REF
          script_stop: true
          script: |
            set -Eeuo pipefail
            APP_ROOT="${OKR_APP_ROOT:-$HOME/apps}"
            WORK_DIR="$(mktemp -d "$APP_ROOT/okr-action-XXXXXX")"
            cleanup() {
              rm -rf "$WORK_DIR"
            }
            trap cleanup EXIT

            curl -L --connect-timeout 20 --retry 5 \
              -H "Cache-Control: no-cache" \
              -o "$WORK_DIR/source.zip" \
              "$OKR_REPO_ZIP_URL"

            mkdir -p "$WORK_DIR/source"
            unzip -q "$WORK_DIR/source.zip" -d "$WORK_DIR/source"
            SOURCE_DIR="$(find "$WORK_DIR/source" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            if [ -z "$SOURCE_DIR" ]; then
              echo "Unable to locate extracted source directory" >&2
              exit 1
            fi

            chmod +x "$SOURCE_DIR/scripts/deploy-production.sh"
            OKR_SOURCE_DIR="$SOURCE_DIR" bash "$SOURCE_DIR/scripts/deploy-production.sh"
