name: Deploy production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          OKR_REPO_ZIP_URL: https://codeload.github.com/${{ github.repository }}/zip/${{ github.sha }}
          OKR_DEPLOY_REF: ${{ github.sha }}
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT || 22 }}
          envs: OKR_REPO_ZIP_URL,OKR_DEPLOY_REF
          script_stop: true
          script: |
            set -Eeuo pipefail
            APP_ROOT="${OKR_APP_ROOT:-$HOME/apps}"
            WORK_DIR="$(mktemp -d "$APP_ROOT/okr-action-XXXXXX")"
            cleanup() {
              rm -rf "$WORK_DIR"
            }
            trap cleanup EXIT

            curl -L --connect-timeout 20 --retry 5 \
              -H "Cache-Control: no-cache" \
              -o "$WORK_DIR/source.zip" \
              "$OKR_REPO_ZIP_URL"

            mkdir -p "$WORK_DIR/source"
            unzip -q "$WORK_DIR/source.zip" -d "$WORK_DIR/source"
            SOURCE_DIR="$(find "$WORK_DIR/source" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            if [ -z "$SOURCE_DIR" ]; then
              echo "Unable to locate extracted source directory" >&2
              exit 1
            fi

            chmod +x "$SOURCE_DIR/scripts/deploy-production.sh"
            OKR_SOURCE_DIR="$SOURCE_DIR" bash "$SOURCE_DIR/scripts/deploy-production.sh"
